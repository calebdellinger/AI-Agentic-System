version: "3.9"

services:
  trinity-api:
    build:
      context: .
      dockerfile: business-trinity/Dockerfile
    container_name: trinity-api
    environment:
      - PROVIDER_MODE=${PROVIDER_MODE:-GEMINI}
      - FALLBACK_PROVIDER_MODE=${FALLBACK_PROVIDER_MODE:-GEMINI}
      - N8N_WORKORDER_WEBHOOK_URL=${N8N_WORKORDER_WEBHOOK_URL:-http://n8n:5678/webhook/trinity-workorder}
      - N8N_WORKORDER_WEBHOOK_SECRET=${N8N_WORKORDER_WEBHOOK_SECRET:-change-me}
      - RHYTHM_STORAGE_ROOT=/rhythms
      - SPINALCORD_ROOT=/spinalcord
      - COMPANY_KNOWLEDGE_ROOT=/company-knowledge
      - COMPANY_KNOWLEDGE_SLUG=${COMPANY_KNOWLEDGE_SLUG:-example-regional-concrete}
    volumes:
      - spinalcord:/spinalcord
      - trinity_rhythms:/rhythms
      - ./company-knowledge:/company-knowledge
    networks:
      - net_internal

  # Rationale: Local LLM runner for Zenbook Pro Duo (6GB VRAM optimization).
  # How: Uses official Ollama image with NVIDIA GPU passthrough.
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - net_internal
      - net_llm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vllm-server:
    profiles: ["llm"]
    image: vllm/vllm-openai:latest
    container_name: vllm-server
    environment:
      - MODEL=${VLLM_MODEL:-meta-llama/Llama-3.2-3B-Instruct}
    command: ["--model", "${VLLM_MODEL:-meta-llama/Llama-3.2-3B-Instruct}", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    networks:
      - net_llm

  rd-lab-worker:
    build:
      context: .
      dockerfile: rd-lab/Dockerfile
    container_name: rd-lab-worker
    environment:
      - PROVIDER_MODE=${PROVIDER_MODE:-GEMINI}
      # When PROVIDER_MODE=LOCAL: point at Ollama/vLLM (e.g. http://ollama:11434/v1).
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://ollama:11434/v1}
      - MODEL_NAME=${MODEL_NAME:-gemini-2.5-flash-lite}
      # Throttle policy model knobs (used when constraints.compute_tier
      # requests/allow light vs heavy selection).
      - LOCAL_LIGHT_MODEL_NAME=${LOCAL_LIGHT_MODEL_NAME:-${MODEL_NAME:-llama3.2:1b}}
      - LOCAL_HEAVY_MODEL_NAME=${LOCAL_HEAVY_MODEL_NAME:-llama3.2:3b}
      - AUTOGEN_TEMPERATURE_LIGHT=${AUTOGEN_TEMPERATURE_LIGHT:-0.2}
      - AUTOGEN_TEMPERATURE_HEAVY=${AUTOGEN_TEMPERATURE_HEAVY:-0.1}
      # How many attempts to allow on the light model before upgrading.
      - LOCAL_MAX_LIGHT_ATTEMPTS=${LOCAL_MAX_LIGHT_ATTEMPTS:-1}
      # AutoGen: default cloud is Gemini (PROVIDER_MODE=GEMINI + GOOGLE_API_KEY).
      # Local-only: PROVIDER_MODE=LOCAL; optional AUTOGEN_ENABLE_GROUPCHAT_LOCAL=true for GroupChat on big local models.
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - AUTOGEN_ENABLE_GROUPCHAT_LOCAL=${AUTOGEN_ENABLE_GROUPCHAT_LOCAL:-false}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_OPENAI_BASE_URL=${GEMINI_OPENAI_BASE_URL:-}
      - AUTOGEN_OPENAI_BASE_URL=${AUTOGEN_OPENAI_BASE_URL:-}
      - AUTOGEN_OPENAI_API_KEY=${AUTOGEN_OPENAI_API_KEY:-}
      - CLOUD_LIGHT_MODEL_NAME=${CLOUD_LIGHT_MODEL_NAME:-gemini-2.5-flash-lite}
      - CLOUD_HEAVY_MODEL_NAME=${CLOUD_HEAVY_MODEL_NAME:-gemini-2.5-flash}
      - RHYTHM_STORAGE_ROOT=/rhythms
      - SPINALCORD_ROOT=/spinalcord
      - COMPANY_KNOWLEDGE_ROOT=/company-knowledge
      - COMPANY_KNOWLEDGE_SLUG=${COMPANY_KNOWLEDGE_SLUG:-example-regional-concrete}
    volumes:
      - spinalcord:/spinalcord
      - lab_rhythms:/rhythms
      # Shared curated knowledge (both hemispheres). Vector indexes live under vector-index/.
      - ./company-knowledge:/company-knowledge
      # Debug mode: mount workspace so instrumentation can write
      # `debug-ee17f7.log` back to the host for analysis.
      - .:/workspace
    networks:
      - net_lab
      - net_llm
      - net_egress

  trinity-ui:
    build:
      context: .
      dockerfile: trinity-ui/Dockerfile
    container_name: trinity-ui
    ports:
      - "8501:8501"
    volumes:
      - spinalcord:/spinalcord
    networks:
      - net_internal

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
      - NODE_ENV=production
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-change-me}
      - N8N_WORKORDER_WEBHOOK_SECRET=${N8N_WORKORDER_WEBHOOK_SECRET:-change-me}
      - NOTION_API_TOKEN=${NOTION_API_TOKEN:-}
      - NOTION_API_VERSION=${NOTION_API_VERSION:-2022-06-28}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID:-}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - net_internal

volumes:
  spinalcord:
  trinity_rhythms:
  lab_rhythms:
  n8n_data:
  ollama_data:

networks:
  net_internal:
  net_lab:
    internal: true
  net_llm:
  # Rationale: `net_lab` is internal-only; attach this bridge for optional cloud API egress.
  net_egress: